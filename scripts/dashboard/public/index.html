<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plaid Demo Pipeline</title>
  <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
<div id="app">
  <!-- Header -->
  <header id="header">
    <span class="header-title">Plaid Demo Pipeline</span>
    <div id="recording-status-badge" class="recording-badge" style="display:none" title="Recording status"></div>
    <div class="header-spacer"></div>
    <button id="build-selector-btn" class="build-selector-btn">
      <span id="build-selector-label">Loading…</span>
      <span class="build-selector-chevron">›</span>
    </button>
  </header>

  <div id="stage-banner" style="display:none">
    <span id="stage-banner-icon" class="stage-banner-icon">◎</span>
    <span id="stage-banner-label">Pipeline running…</span>
    <span id="stage-banner-elapsed" class="stage-banner-elapsed"></span>
    <button id="stage-banner-view-btn" class="stage-banner-view-btn">View Logs ▶</button>
  </div>

  <div id="layout">
    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="nav-item active" data-tab="overview">
        <span class="nav-icon">◈</span> Overview
      </div>
      <div class="nav-item" data-tab="config">
        <span class="nav-icon">⚙</span> Config
      </div>
      <div class="nav-item" data-tab="files">
        <span class="nav-icon">📁</span> Files
      </div>
      <div class="nav-item" data-tab="storyboard">
        <span class="nav-icon">🎬</span> Storyboard
      </div>
      <div class="nav-item" data-tab="pipeline">
        <span class="nav-icon">▶</span> Pipeline
      </div>
      <div class="nav-item" data-tab="valueprop" title="inputs/products markdown and Fact inbox">
        <span class="nav-icon">📝</span> Product knowledge
      </div>
      <div class="nav-item" data-tab="demo-apps">
        <span class="nav-icon">▣</span> Demo Apps
      </div>

      <div class="sidebar-bottom">
        <button id="studio-btn" class="disabled">Open Remotion Studio</button>
      </div>
    </nav>

    <!-- Main content -->
    <main id="main">
      <!-- Overview Tab -->
      <div class="tab-panel active" id="tab-overview">
        <div id="overview-content">
          <div class="empty-state">Select a run to view overview</div>
        </div>
      </div>

      <!-- Config Tab -->
      <div class="tab-panel" id="tab-config">
        <div id="config-content">
          <div class="empty-state">Loading config…</div>
        </div>
      </div>

      <!-- Files Tab -->
      <div class="tab-panel" id="tab-files">
        <div id="files-content">
          <div class="empty-state">Select a run to browse files</div>
        </div>
      </div>

      <!-- Storyboard Tab -->
      <div class="tab-panel" id="tab-storyboard">
        <div id="storyboard-content">
          <div class="empty-state">Select a run to view storyboard</div>
        </div>
      </div>

      <!-- Pipeline Tab -->
      <div class="tab-panel" id="tab-pipeline">
        <div id="pipeline-content">
          <div class="empty-state">Loading pipeline…</div>
        </div>
      </div>

      <!-- Product knowledge (markdown + Fact inbox) -->
      <div class="tab-panel" id="tab-valueprop">
        <div id="valueprop-content">
          <div class="empty-state">Loading…</div>
        </div>
      </div>

      <!-- Demo Apps Tab -->
      <div class="tab-panel" id="tab-demo-apps">
        <div id="demo-apps-content">
          <div class="empty-state">Loading…</div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Lightbox -->
<div id="lightbox">
  <div id="lightbox-inner">
    <button id="lightbox-close" title="Close (Esc)">✕</button>
    <div id="lightbox-nav">
      <button class="lightbox-arrow" id="lightbox-prev">&#8592;</button>
      <button class="lightbox-arrow" id="lightbox-next">&#8594;</button>
    </div>
    <img id="lightbox-img" src="" alt="">
    <div id="lightbox-caption"></div>
  </div>
</div>

<script src="/static/dashboard.js"></script>

<!-- Build panel overlay (close on outside click) -->
<div id="build-panel-overlay" style="display:none;position:fixed;inset:0;z-index:999"></div>

<!-- Build selector panel -->
<div id="build-panel" class="build-panel">
  <div class="build-panel-header">
    <span class="build-panel-title">Builds</span>
    <button id="build-panel-close" class="build-panel-close" title="Close">✕</button>
  </div>
  <div id="build-panel-content">
    <div class="empty-state">Loading…</div>
  </div>
</div>
</body>
</html>
