<!doctype html>
<html lang="en">
<!--
  CANONICAL PIPELINE SLIDE SHELL — T3 Statement reference (Plaid Deck Design System)

  Design source: templates/slide-template/brand-design-briefs/DECK_DESIGN_SYSTEM.md
  Merge rules: PIPELINE_SLIDE_SHELL_RULES.md

  Pipeline contract:
  - One <div data-testid="step-{id}" class="step"> per slide scene
  - Child: <div class="slide-root"> with optional .light | .cream | .holo
  - Inner: .frame + .chrome-logo + .eyebrow-tag + .h-title + body + .chrome-foot
  - Global #api-response-panel for JSON (not inside .slide-root)
-->
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pipeline slide shell — T3 Statement reference</title>
  <link rel="stylesheet" href="./slide.css" />
  <script src="https://cdn.jsdelivr.net/npm/renderjson@1.4.0/renderjson.min.js"></script>
  <style>
    .step { display: none; box-sizing: border-box; }
    .step.active {
      display: flex;
      position: static;
      inset: auto;
      width: 100%;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #022544;
    }
  </style>
</head>
<body style="margin:0">

  <div data-testid="step-slide-t3-statement" class="step active">
    <div class="slide-root" data-slide-template="T3">
      <div class="frame">
        <img class="chrome-logo" src="assets/logos/plaid-horizontal-white.png" alt="Plaid" />
        <div class="eyebrow-tag" style="margin-top:24px;">Section 1 — Product story</div>

        <h2 class="h-title">
          Plaid turns linked accounts into
          <em>actionable intelligence.</em>
        </h2>

        <p class="slide-body-text">
          One statement paragraph with breathing room. Sentence case. End with a period.
          Reserve mint for a single highlight phrase if needed.
        </p>

        <div class="chrome-foot">
          <span>03 / 12 &nbsp;·&nbsp; Product story</span>
        </div>
      </div>
    </div>
  </div>

  <div id="link-events-panel" data-testid="link-events-panel" class="side-panel" style="display:none" aria-hidden="true">
    <div class="side-panel-header">Link Events</div>
    <div class="side-panel-body" id="link-events-body"></div>
  </div>

  <div id="api-response-panel" data-testid="api-response-panel" class="side-panel" style="display:none" aria-label="API JSON panel">
    <button type="button" id="api-panel-toggle" data-testid="api-panel-toggle" class="api-panel-edge-toggle" aria-label="Expand API JSON panel" aria-expanded="false">
      <span class="api-panel-toggle-icon" aria-hidden="true"></span>
    </button>
    <header class="side-panel-header"><span>API Response</span></header>
    <div class="side-panel-body"><div id="api-response-content"></div></div>
  </div>

  <script>
(function () {
  'use strict';
  window.__API_PANEL_CONFIG = Object.assign({
    collapsedByDefault: true,
    jsonExpandLevel: 'all',
    autoResize: true,
    minWidthPx: 414,
    maxWidthViewportRatio: 0.6
  }, window.__API_PANEL_CONFIG || {});

  function configureRenderjson() {
    if (typeof renderjson === 'undefined') return;
    var lvl = window.__API_PANEL_CONFIG.jsonExpandLevel;
    if (lvl === 'all' || lvl === Infinity) renderjson.set_show_to_level('all');
    else renderjson.set_show_to_level(Number(lvl) || 999);
    renderjson.set_icons('+', '-');
  }
  configureRenderjson();

  function isPanelVisible() {
    var panel = document.getElementById('api-response-panel');
    if (!panel) return false;
    return panel.style.display === 'flex' && !panel.classList.contains('api-panel-collapsed');
  }
  function syncPanelChrome() {
    var vis = isPanelVisible();
    var leg = document.getElementById('api-panel-toggle');
    if (!leg) return;
    leg.setAttribute('aria-expanded', vis ? 'true' : 'false');
    leg.setAttribute('aria-label', vis ? 'Collapse API JSON panel' : 'Expand API JSON panel');
    if (vis) leg.classList.add('is-open');
    else leg.classList.remove('is-open');
  }
  function showApiPanel() {
    var panel = document.getElementById('api-response-panel');
    if (!panel) return;
    panel.style.display = 'flex';
    panel.classList.remove('api-panel-collapsed');
    syncPanelChrome();
  }
  function hideApiPanel() {
    var panel = document.getElementById('api-response-panel');
    if (!panel) return;
    panel.style.display = 'flex';
    panel.classList.add('api-panel-collapsed');
    syncPanelChrome();
  }
  window.updateApiResponse = function (data) {
    configureRenderjson();
    var panel = document.getElementById('api-response-panel');
    var content = document.getElementById('api-response-content');
    if (!panel || !content) return;
    content.innerHTML = '';
    if (typeof renderjson !== 'undefined') content.appendChild(renderjson(data));
    else {
      var pre = document.createElement('pre');
      pre.textContent = JSON.stringify(data, null, 2);
      content.appendChild(pre);
    }
    if (window.__API_PANEL_CONFIG.collapsedByDefault) hideApiPanel();
    else showApiPanel();
    syncPanelChrome();
  };
  window.toggleApiPanel = function () {
    if (isPanelVisible()) hideApiPanel();
    else showApiPanel();
  };
  document.getElementById('api-panel-toggle')?.addEventListener('click', function () {
    window.toggleApiPanel();
  });
  syncPanelChrome();
})();
  </script>
</body>
</html>
