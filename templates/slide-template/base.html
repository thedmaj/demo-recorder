<!--
  Minimal slide skeleton (Plaid-only).
  For full structure — header logo lockup, footer strip, single edge JSON toggle control, renderjson wiring —
  use pipeline-slide-shell.html + PIPELINE_SLIDE_SHELL_RULES.md (injected into the build prompt).
-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plaid Slide (minimal)</title>
    <link rel="stylesheet" href="./slide.css" />
  </head>

  <body>
    <div class="slide-root">
      <header class="slide-header">
        <div class="slide-header-left">
          <div class="slide-header-pill" data-testid="slide-product">PLAID</div>
          <div class="slide-header-endpoint" data-testid="slide-endpoint">/product/method</div>
        </div>
      </header>

      <main class="slide-body">
        <section class="slide-hero">
          <h1 class="slide-title" data-testid="slide-title">Title goes here</h1>
          <p class="slide-subtitle" data-testid="slide-subtitle">Optional supporting one-liner.</p>
        </section>

        <section class="slide-panels" data-testid="slide-panels">
          <div class="slide-panel" data-testid="slide-panel-1">
            <h3 class="slide-panel-title">Panel title</h3>
            <p class="slide-panel-body">Body text (keep line lengths readable).</p>
          </div>
        </section>

        <aside class="slide-callout" data-testid="slide-callout">
          <div class="slide-callout-value">98%</div>
          <div class="slide-callout-label">Coverage for instant verification</div>
        </aside>
      </main>

      <footer class="slide-footer" data-testid="slide-footer">
        <img src="./plaid-logo-no-text-white-background.png" alt="" width="20" height="20" style="object-fit:contain;border-radius:4px" />
        <span class="slide-footer-meta">plaid.com</span>
      </footer>
    </div>

    <div id="link-events-panel" data-testid="link-events-panel" class="side-panel" style="display:none" aria-hidden="true">
      <div class="side-panel-header">Link Events</div>
      <div class="side-panel-body" id="link-events-body"></div>
    </div>

    <div id="api-response-panel" data-testid="api-response-panel" class="side-panel" style="display:none" aria-label="API JSON panel">
      <button type="button" id="api-panel-toggle" data-testid="api-panel-toggle" class="api-panel-edge-toggle" aria-label="Expand API JSON panel" aria-expanded="false">
        <span class="api-panel-toggle-icon" aria-hidden="true"></span>
      </button>
      <header class="side-panel-header">
        <span>API Response</span>
      </header>
      <div class="side-panel-body">
        <div id="api-response-content"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/renderjson@1.4.0/renderjson.min.js"></script>
    <script>
      window.__API_PANEL_CONFIG = Object.assign({
        collapsedByDefault: true,
        jsonExpandLevel: 'all',
        autoResize: true,
        minWidthPx: 414,
        maxWidthViewportRatio: 0.60
      }, window.__API_PANEL_CONFIG || {});
    </script>
  </body>
</html>
