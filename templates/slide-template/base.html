<!--
Slide Template (Plaid-only)
Intended use:
- As a design reference for pipeline-generated "slide" steps.
- Slides are full-viewport step surfaces in the demo app during recording,
  and can also be extracted for PowerPoint supplementation.

This file is a template/skeleton for HTML structure. The build pipeline
should embed a matching structure and reuse the CSS variables from slide.css.
-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plaid Slide</title>
    <link rel="stylesheet" href="./slide.css" />
  </head>

  <body>
    <!-- Root: keep it full viewport so it can map 1:1 to a step div -->
    <div class="slide-root">
      <!-- Header pattern: endpoint + concise step title -->
      <header class="slide-header">
        <div class="slide-header-left">
          <div class="slide-header-pill" data-testid="slide-product">PLAID</div>
          <div class="slide-header-endpoint" data-testid="slide-endpoint">/product/method</div>
        </div>
      </header>

      <!-- Body: title + text + (optional) panels -->
      <main class="slide-body">
        <section class="slide-hero">
          <h1 class="slide-title" data-testid="slide-title">Title goes here</h1>
          <p class="slide-subtitle" data-testid="slide-subtitle">Optional supporting one-liner.</p>
        </section>

        <!-- Panels are optional; use glassmorphism for consistency -->
        <section class="slide-panels" data-testid="slide-panels">
          <div class="slide-panel" data-testid="slide-panel-1">
            <h3 class="slide-panel-title">Panel title</h3>
            <p class="slide-panel-body">Body text (keep line lengths readable).</p>
          </div>
        </section>

        <!-- Optional: stat/callout -->
        <aside class="slide-callout" data-testid="slide-callout">
          <div class="slide-callout-value">98%</div>
          <div class="slide-callout-label">Coverage for instant verification</div>
        </aside>
      </main>
    </div>
  </body>
</html>
